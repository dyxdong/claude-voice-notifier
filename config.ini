# Claude Voice Notifier Configuration
# 声音文件配置

[General]
# 应用版本号
Version=1.0.6

# 默认声音文件（兼容旧版本，对话框提醒使用）
DefaultSound=asterisk.wav

# 对话框提醒声音文件
DialogSound=asterisk.wav

# 当前会话完成提醒声音文件
SessionCompleteSound=exclamation.wav

[Media]
# 声音文件目录（相对于项目根目录），声音文件放此目录，重启程序配置生效
MediaDir=.\media

# 声音文件扩展名（逗号分隔）
Extensions=.wav,.mp3

[Monitor]
# 信号检测冷却时间（毫秒）
CooldownMs=2000

# 日志监控开关（true/false）
EnableLogMonitor=false

# 进程 ID 日志输出开关（true/false）- 打开后显示监控进程的 PID 日志
EnableProcessLog=false

[DialogPlayback]
# 对话框提醒播放次数（1-6）
DialogPlayCount=2

# 对话框提醒播放间隔（毫秒）：500, 600, 800, 1000, 1500
DialogPlayInterval=500

[SessionCompletePlayback]
# 当前会话完成提醒播放次数（1-6）
SessionCompletePlayCount=1

# 当前会话完成提醒播放间隔（毫秒）：500, 600, 800, 1000, 1500
SessionCompletePlayInterval=500

[Appearance]
# 菜单主题：light（白色）或 dark（墨黑色）
MenuTheme=dark

# 语言：zh-CN（简体中文）或 en-US（English）
Language=zh-CN


